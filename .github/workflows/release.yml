name: go-knifer-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Verify release gates
        run: make ci-test COVERAGE_FILE=/tmp/go-knifer-release-coverage.out

      - name: Verify release security gates
        run: make security-check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
